name: Deploy Flutter Web Demo

on:
  push:
    branches: ["main"]
    paths:
      - "example/**"
      - ".github/workflows/deploy-pages.yml"
      - "pubspec.yaml"
      - "README.md"
      - "README_EN.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve base href for GitHub Pages
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${REPO_LOWER}" == "${OWNER_LOWER}.github.io" ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO_NAME}/"
          fi

          echo "BASE_HREF=${BASE_HREF}" >> "$GITHUB_ENV"
          echo "Using BASE_HREF=${BASE_HREF}"

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build web demo
        working-directory: example
        run: flutter build web --release --base-href "${BASE_HREF}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
